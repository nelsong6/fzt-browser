name: Build

# Called by the dep-update template AFTER it cuts a release. This workflow's
# only job is to build the wasm + stage JS/CSS assets and upload them to the
# already-existing release. The tag is passed as an input — no branch HEAD
# resolution, no race with the release-creation step.
#
# Release creation and downstream dispatch (to my-homepage, fzt-showcase) are
# handled by the template in dispatch.yml. This workflow does NOT cut tags
# and does NOT dispatch.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build artifacts for (and upload to)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get engine version from go.mod
        id: engine
        run: echo "version=$(grep 'github.com/nelsong6/fzt ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Build WASM
        run: >
          go build
          -ldflags="-X github.com/nelsong6/fzt/render.Version=${{ inputs.tag }}
          -X github.com/nelsong6/fzt-frontend.EngineVersion=${{ steps.engine.outputs.version }}"
          -o fzt.wasm .
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} \
            fzt.wasm \
            fzt-terminal.js \
            fzt-terminal.css \
            fzt-web.js \
            fzt-dom-renderer.js \
            --clobber \
            -R ${{ github.repository }}
