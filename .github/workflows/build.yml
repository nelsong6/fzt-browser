name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compute version
        id: version
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            echo "version=v0.1.0" >> $GITHUB_OUTPUT
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            echo "version=v0.1.$((patch + 1))" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get engine version from go.mod
        id: engine
        run: echo "version=$(grep 'github.com/nelsong6/fzt ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Build WASM
        run: >
          go build
          -ldflags="-X github.com/nelsong6/fzt/render.Version=${{ steps.version.outputs.version }}
          -X github.com/nelsong6/fzt-frontend.EngineVersion=${{ steps.engine.outputs.version }}"
          -o fzt.wasm .
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
      - name: Stage release assets
        run: |
          mkdir -p release
          cp fzt.wasm release/
          cp fzt-terminal.js release/
          cp fzt-terminal.css release/
          cp fzt-web.js release/
          cp fzt-dom-renderer.js release/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            release/* \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      # TODO: add Azure OIDC login + GitHub App token + downstream dispatch to
      # fzt-showcase / my-homepage once infra-bootstrap wires this repo into
      # its app module for_each (adds ARM_CLIENT_ID / KEY_VAULT_NAME vars).
