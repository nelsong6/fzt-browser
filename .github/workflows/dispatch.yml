name: Dependency Update

on:
  repository_dispatch:
    types: [fzt-updated]

# The called reusable workflow declares contents:write + actions:write. Without
# these granted on the caller, the token falls back to the repo default ('read')
# and the workflow startup_failures instantly on every dispatch.
permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt github.com/nelsong6/fzt-terminal
      # Atomic path: template bumps go.mod, cuts the release at the pushed
      # sha, triggers build.yml with the new tag to build+upload wasm/JS
      # assets, and dispatches fzt-updated to my-homepage + fzt-showcase.
      dispatch-repos: my-homepage,fzt-showcase
      dispatch-event: fzt-updated
      artifact-build-workflow: build.yml
