name: Release

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run release.yml -R nelsong6/fzt-browser`.

on:
  workflow_dispatch:

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: nelsong6/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
    with:
      dispatch-repos: my-homepage,fzt-showcase
      dispatch-event: fzt-updated
      artifact-build-workflow: build.yml
